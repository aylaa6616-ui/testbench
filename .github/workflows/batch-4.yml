name: Batch 4 - Projects 16 to 20

on:
  workflow_run:
    workflows: ["Batch 3 - Projects 11 to 15"]
    types: [completed]
  workflow_dispatch:

jobs:
  run-project:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        project: [project16, project17, project18, project19, project20]
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium

      - name: Run ${{ matrix.project }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          S3_BUCKET_NAME: ${{ secrets.S3_BUCKET_NAME }}
        run: python -m ${{ matrix.project }}.main
